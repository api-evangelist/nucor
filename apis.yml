aid: nucor
name: Nucor
description: >-
  Nucor Corporation is a Fortune 500 American steel and steel products
  manufacturer headquartered in Charlotte, North Carolina. It is the largest
  steel producer in the United States and the largest recycler of any material
  in North America. Nucor does not publish a public developer API or OpenAPI
  specification; this index captures the corporate, sustainability, and
  certification resources that are publicly available.
